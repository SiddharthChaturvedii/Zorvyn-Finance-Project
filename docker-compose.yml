version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: zorvyn-db
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-zorvyn_finance}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: zorvyn-cache
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./finance-backend
      dockerfile: Dockerfile
    container_name: zorvyn-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@database:5432/${DATABASE_NAME:-zorvyn_finance}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key}
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN_DAYS: 7
    depends_on:
      - database
      - redis

  frontend:
    build:
      context: ./finance-frontend
      dockerfile: Dockerfile
    container_name: zorvyn-frontend
    ports:
      - "4000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
